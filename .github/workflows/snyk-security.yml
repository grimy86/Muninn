name: Snyk Security Scan

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  snyk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Snyk
        uses: snyk/actions/setup@v3
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # IMPORTANT: code scan, not dependency scan
      - name: Run Snyk Code
        run: snyk code test
